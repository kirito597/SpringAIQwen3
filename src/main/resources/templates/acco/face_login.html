<!DOCTYPE html>
<html lang="en">
<head>
    <title>人脸登录</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <script th:src="@{/js/vue.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/element-ui.js}"></script>
    <script th:src="@{/js/axios.min.js}" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E8F0E9 0%, #D1E0D4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .face-login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #2D5A4B;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            background: #2C4A3E;
            margin-bottom: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        video, .video-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .custom-button {
            flex: 1;
            height: 48px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            color: #1E3A2F;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .custom-button:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 30, 10, 0.15);
        }

        .custom-button:active {
            transform: translateY(0);
        }

        /* 密码登录按钮微调 */
        .pwd-button {
            background: rgba(230, 245, 255, 0.35);
        }

        .face-login-button {
            background: rgba(160, 220, 160, 0.35);
        }

        /* 重新拍照按钮小一些 */
        .retry-button {
            flex: 0.5;
            background: rgba(240, 240, 240, 0.3);
            font-size: 14px;
        }

        /* 禁用状态 */
        .custom-button[disabled] {
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
            }
            .button-group {
                flex-direction: column;
            }
            .custom-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="face-login-container">
        <div class="login-card">
            <h2 class="title">人脸识别登录</h2>

            <!-- 视频/图像区域 - 无提示文字 -->
            <div class="video-wrapper" v-show="!capturedImage">
                <video ref="video" autoplay></video>
                <canvas ref="canvas" style="display: none;"></canvas>
            </div>

            <div class="video-wrapper" v-show="capturedImage">
                <img :src="capturedImage" alt="captured face" />
            </div>

            <!-- 按钮组 - 无图标版本 -->
            <div class="button-group" v-show="!isCameraActive && !capturedImage">
                <el-button class="custom-button init-button" @click="initCamera">
                    打开摄像头
                </el-button>
                <el-button class="custom-button pwd-button" @click="goPasswordLogin">
                    密码登录
                </el-button>
            </div>

            <div class="button-group" v-show="isCameraActive && !capturedImage">
                <el-button class="custom-button face-login-button" @click="login">
                    人脸登录
                </el-button>
            </div>

            <div class="button-group" v-show="capturedImage">
                <el-button class="custom-button retry-button" @click="resetCapture">
                    重新拍照
                </el-button>
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: "#app",
        data: {
            isCameraActive: false,
            capturedImage: null
        },
        methods: {
            initCamera() {
                if (this.isCameraActive) return;
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        this.$refs.video.srcObject = stream;
                        this.isCameraActive = true;
                        this.capturedImage = null;
                    })
                    .catch(() => {
                        this.$message.error("无法访问摄像头，请检查权限");
                    });
            },

            capture() {
                const canvas = this.$refs.canvas;
                const video = this.$refs.video;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                return canvas.toDataURL('image/jpeg');
            },

            login() {
                if (!this.isCameraActive) {
                    this.$message.warning("请先开启摄像头");
                    return;
                }

                const faceImage = this.capture();
                this.capturedImage = faceImage;

                // 停止摄像头
                const stream = this.$refs.video.srcObject;
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    this.$refs.video.srcObject = null;
                }
                this.isCameraActive = false;

                // 发送请求
                axios({
                    method: 'POST',
                    url: '/api/acc/faceLogin',
                    data: JSON.stringify({ "baseImage": faceImage.split(',')[1] }),
                    headers: { 'Content-Type': 'application/json' }
                }).then(res => {
                    if (res.data.code === 200) {
                        localStorage.setItem("user", JSON.stringify(res.data.data));
                        this.$message.success(res.data.msg);
                        setTimeout(() => {
                            window.location.href = "http://localhost:8080/";
                        }, 1000);
                    } else {
                        this.$message.error(res.data.msg || "登录失败");
                        this.resetCapture();
                    }
                }).catch(() => {
                    this.$message.error("服务器错误，请稍后重试");
                    this.resetCapture();
                });
            },

            goPasswordLogin() {
                window.location.href = "http://localhost:8080/pwd_login";
            },

            resetCapture() {
                this.capturedImage = null;
                if (this.$refs.video && this.$refs.video.srcObject) {
                    const stream = this.$refs.video.srcObject;
                    stream.getTracks().forEach(track => track.stop());
                    this.$refs.video.srcObject = null;
                }
                this.isCameraActive = false;
            }
        },
        beforeDestroy() {
            const stream = this.$refs.video?.srcObject;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }
    });
</script>
</body>
</html>
