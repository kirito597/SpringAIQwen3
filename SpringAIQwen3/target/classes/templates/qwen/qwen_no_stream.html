<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>非流式输出</title>

    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <!-- JavaScript -->
    <script type="text/javascript" th:src="@{/js/vue.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/element-ui.js}"></script>
    <script type="text/javascript" th:src="@{/js/axios.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/marked.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/purify.min.js}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E8F0E9 0%, #D1E0D4 100%);
            color: #1E3A2F;
        }

        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .navbar .el-button {
            margin-right: 12px;
            font-size: 15px;
            padding: 10px 24px;
            border-radius: 30px !important;
            background: rgba(255, 255, 255, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #1E3A2F !important;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .navbar .el-button:hover {
            background: rgba(255, 255, 255, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 30, 10, 0.15) !important;
        }

        .navbar .spacer {
            flex: 1;
        }

        /* 消息容器 */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            margin: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 单条消息气泡 */
        .message-item {
            display: flex;
            margin-bottom: 20px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-item.ai {
            justify-content: flex-start;
        }
        .message-item.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.6;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }

        .message-ai {
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1E3A2F;
            border-bottom-left-radius: 8px;
        }

        .message-user {
            background: rgba(46, 125, 80, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1E3A2F;
            border-bottom-right-radius: 8px;
        }

        /* Markdown 样式 */
        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3 {
            margin-top: 14px;
            margin-bottom: 8px;
            color: #1E3A2F;
        }
        .message-bubble p {
            margin: 8px 0;
        }
        .message-bubble pre {
            background: rgba(30, 40, 35, 0.8);
            color: #f8f8f2;
            padding: 12px;
            border-radius: 16px;
            overflow-x: auto;
            font-family: monospace;
            margin: 10px 0;
            backdrop-filter: blur(4px);
        }
        .message-bubble code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95em;
        }
        .message-bubble blockquote {
            border-left: 3px solid rgba(46, 125, 80, 0.5);
            margin: 12px 0;
            padding-left: 16px;
            color: #1E3A2F;
            opacity: 0.8;
            font-style: italic;
        }

        /* 输入区域 */
        #input-area {
            padding: 20px 24px 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper .el-textarea {
            flex: 1;
        }

        .input-wrapper .el-textarea__inner {
            min-height: 48px !important;
            padding: 14px 20px !important;
            resize: none;
            background: rgba(255, 255, 255, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            border-radius: 30px !important;
            font-size: 15px;
            color: #1E3A2F !important;
            transition: all 0.3s ease;
        }

        .input-wrapper .el-textarea__inner:focus {
            background: rgba(255, 255, 255, 0.5) !important;
            border-color: rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3) !important;
        }

        .input-wrapper .el-textarea__inner::placeholder {
            color: #4A6B5C !important;
            opacity: 0.7;
        }

        .input-wrapper .el-button {
            width: 100px;
            height: 52px;
            padding: 0;
            font-size: 15px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #1E3A2F !important;
            border-radius: 30px !important;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .input-wrapper .el-button:hover {
            background: rgba(255, 255, 255, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 30, 10, 0.15) !important;
        }

        .input-wrapper .el-button:active {
            transform: translateY(0);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(46, 125, 80, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(46, 125, 80, 0.5);
        }

        @media (max-width: 768px) {
            .message-bubble {
                max-width: 90%;
            }
            #messages {
                margin: 10px;
                padding: 16px;
            }
            #input-area {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 导航栏 -->
    <div class="navbar">
        <el-button>非流式对话</el-button>
        <div class="spacer"></div>
    </div>

    <!-- 消息显示框 -->
    <div id="messages">
        <div v-for="(msg, index) in messages" :key="index"
             :class="['message-item', msg.role === 'user' ? 'user' : 'ai']">
            <div
                    :class="['message-bubble', msg.role === 'user' ? 'message-user' : 'message-ai']"
                    v-if="msg.type === 'text'"
                    v-html="renderMarkdown(msg.content)">
            </div>
        </div>
    </div>

    <!-- 消息输入框 -->
    <div id="input-area">
        <div class="input-wrapper">
            <el-input
                    type="textarea"
                    v-model="message"
                    :rows="2"
                    placeholder="请输入消息..."
                    @keydown.enter.native.prevent="ollamaNoStream"
            ></el-input>
            <el-button icon="el-icon-message" @click="ollamaNoStream">发送</el-button>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: "#app",

        data() {
            return {
                message: "",
                messages: [
                    {
                        role: 'assistant',
                        type: "text",
                        content: "你好，我是你的助手YOYO，我通过千问模型和你对话！",
                    }
                ]
            }
        },

        methods: {
            ollamaNoStream() {
                if (this.setRegex()) {
                    if (!this.message.trim()) return;

                    // 添加用户消息
                    this.messages.push({
                        role: "user",
                        type: "text",
                        content: this.message
                    });

                    // 添加“思考中”占位符
                    this.messages.push({
                        role: "assistant",
                        type: "text",
                        content: "助手正在思考中..."
                    });

                    const thinkingIndex = this.messages.length - 1;
                    const userMsg = this.message.trim();
                    this.message = "";

                    axios({
                        url: "/api/qwen/chat",
                        method: "GET",
                        params: { message: userMsg }
                    }).then(res => {
                        this.$set(this.messages, thinkingIndex, {
                            role: "assistant",
                            type: "text",
                            content: res.data
                        });
                        this.scrollTobottom();
                    }).catch(err => {
                        this.$message.error("服务器错误，请稍后重试！");
                        this.scrollTobottom();
                    });
                }
            },

            scrollTobottom() {
                this.$nextTick(() => {
                    const container = document.getElementById('messages');
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                });
            },

            renderMarkdown(text) {
                if (typeof text !== 'string') return '';
                const rawHtml = marked.parse(text || '');
                return DOMPurify.sanitize(rawHtml);
            },

            setRegex() {
                if (localStorage.getItem("user") === null) {
                    this.$message.warning("请登录后使用！");
                    setTimeout(() => {
                        window.location.href = "http://localhost:8080/pwd_login";
                    }, 1000);
                    return false;
                }
                return true;
            },

        },

        mounted() {
            this.scrollTobottom();
        }
    });
</script>

</body>
</html>
