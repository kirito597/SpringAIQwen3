<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>

    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <script type="text/javascript" th:src="@{/js/vue.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/element-ui.js}"></script>
    <script type="text/javascript" th:src="@{/js/axios.min.js}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E8F0E9 0%, #D1E0D4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 40px;
            box-shadow: 0 20px 50px -15px #1f3b1f;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(46, 125, 80, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            backdrop-filter: blur(4px);
        }

        .avatar span {
            font-size: 42px;
            color: #1E3A2F;
            font-weight: 500;
        }

        .username {
            font-size: 24px;
            font-weight: 600;
            color: #1E3A2F;
            margin-bottom: 4px;
        }

        .user-role {
            font-size: 14px;
            color: #4A6B5C;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .info-section {
            margin-bottom: 32px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            width: 80px;
            font-size: 15px;
            color: #4A6B5C;
            font-weight: 500;
        }

        .info-value {
            flex: 1;
            font-size: 16px;
            color: #1E3A2F;
            font-weight: 500;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .action-button {
            flex: 1;
            height: 50px;
            border-radius: 30px !important;
            font-size: 15px !important;
            font-weight: 500 !important;
            border: none !important;
            background: rgba(255, 255, 255, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #1E3A2F !important;
            transition: all 0.3s ease !important;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 30, 10, 0.15) !important;
        }

        .logout-button {
            background: rgba(245, 108, 108, 0.2) !important;
            color: #c44f4f !important;
        }

        .logout-button:hover {
            background: rgba(245, 108, 108, 0.35) !important;
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 30px 20px;
            }
            .info-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .info-label {
                width: auto;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="profile-container">
        <div class="profile-card">
            <!-- 头像区域 -->
            <div class="avatar-section">
                <div class="avatar">
                    <span>{{ avatarChar }}</span>
                </div>
                <div class="username">{{ userInfo.userName || '游客' }}</div>
                <div class="user-role">{{ userInfo.role || '普通用户' }}</div>
            </div>

            <!-- 信息区域 -->
            <div class="info-section">
                <div class="info-item">
                    <div class="info-label">手机号</div>
                    <div class="info-value">{{ userInfo.userPhone || '未绑定' }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">修炼等级</div>
                    <div class="info-value">{{ userInfo.level || '普通会员' }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">注册时间</div>
                    <div class="info-value">{{ formatDate(userInfo.createTime) || '未知' }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">对话次数</div>
                    <div class="info-value">{{ userInfo.chatCount || 0 }} 次</div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <el-button class="action-button" @click="editProfile">编辑资料</el-button>
                <el-button class="action-button" @click="changePassword">修改密码</el-button>
                <el-button class="action-button logout-button" @click="logout">退出登录</el-button>
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                userInfo: {}
            }
        },
        computed: {
            avatarChar() {
                const name = this.userInfo.userName || '用';
                return name.charAt(0).toUpperCase();
            }
        },
        methods: {
            loadUserInfo() {
                // 从 localStorage 获取用户信息
                const userStr = localStorage.getItem('user');
                if (userStr) {
                    try {
                        const user = JSON.parse(userStr);
                        // 模拟一些额外数据
                        this.userInfo = {
                            ...user,
                            role: '普通用户',
                            level: '练气士15境',
                            createTime: '2026-03-14',
                            chatCount: 6
                        };
                    } catch (e) {
                        this.$message.error('获取用户信息失败');
                    }
                } else {
                    this.$message.warning('请先登录');
                    setTimeout(() => {
                        window.location.href = '/pwd_login';
                    }, 1000);
                }
            },

            formatDate(date) {
                if (!date) return '';
                return date;
            },

            editProfile() {
                this.$message.info('编辑资料功能开发中');
            },

            changePassword() {
                this.$message.info('修改密码功能开发中');
            },

            logout() {
                this.$confirm('确定要退出登录吗？', '提示', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    localStorage.removeItem('user');
                    this.$message.success('已退出登录');
                    setTimeout(() => {
                        window.location.href = '/pwd_login';
                    }, 1000);
                }).catch(() => {});
            }
        },
        mounted() {
            this.loadUserInfo();
        }
    });
</script>
</body>
</html>
